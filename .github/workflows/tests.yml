name: Tests CESIZen

on:
    push:
        branches: [ main, develop ]
    pull_request:
        branches: [ main ]

jobs:
    tests:
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql:8.0
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: cesizen
                    MYSQL_USER: cesizen
                    MYSQL_PASSWORD: cesizen
                ports:
                    - 3306:3306
                options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql

            - name: Install dependencies
              run: composer install --prefer-dist --no-progress

            - name: Generate JWT keys
              run: |
                  mkdir -p config/jwt
                  openssl genrsa -out config/jwt/private.pem 4096
                  openssl rsa -in config/jwt/private.pem -pubout -out config/jwt/public.pem

            - name: Grant privileges
              run: mysql -h 127.0.0.1 -u root -proot -e "GRANT ALL PRIVILEGES ON *.* TO 'cesizen'@'%'; FLUSH PRIVILEGES;"

            - name: Create test database
              run: mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS cesizen_test;"

            - name: Run migrations
              env:
                  DATABASE_URL: mysql://cesizen:cesizen@127.0.0.1:3306/cesizen_test?serverVersion=8.0
                  APP_ENV: test
              run: php bin/console doctrine:migrations:migrate --no-interaction

            - name: Load fixtures
              env:
                  DATABASE_URL: mysql://cesizen:cesizen@127.0.0.1:3306/cesizen_test?serverVersion=8.0
                  APP_ENV: test
              run: php bin/console doctrine:fixtures:load --no-interaction

            - name: Run tests
              env:
                  DATABASE_URL: mysql://cesizen:cesizen@127.0.0.1:3306/cesizen_test?serverVersion=8.0
              run: php bin/phpunit
